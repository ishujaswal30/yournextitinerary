baseURL = "https://yournextitinerary.com/"
languageCode = "en-us"
title = "Your next itinerary"
[pagination]
  pagerSize = 6

taxonomies = { tag = "tags", category = "categories", country = "countries" }

enableRobotsTXT = true

[params]
  description = "A travel journal of slow routes, vivid skies, and honest itineraries."
  author = "Ishu Jaswal"
  homepage_bio = "I'm Ishu — a Chicago-based data scientist and traveler who believes the best trips start with good research. This is where I share honest itineraries, practical tips, and the routes worth taking."

[related]
  threshold = 80
  includeNewer = true
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 120
  [[related.indices]]
    name = "categories"
    weight = 80
  [[related.indices]]
    name = "date"
    weight = 10

[markup]
  [markup.highlight]
    noClasses = false

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Destinations"
    url = "/destinations/"
    weight = 2
  [[menu.main]]
    name = "Map"
    url = "/map/"
    weight = 3
  [[menu.main]]
    name = "Travel Guides"
    url = "/guides/"
    weight = 4
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 5
